<mat-card>

    <mat-card-title>
        Employee List
    </mat-card-title>
    <hr>

    <!-- <h3>Total Employees: {{ dataSource.data.length }}</h3> -->

    <mat-form-field appearance="outline">

        <mat-label>Search Employee</mat-label>

        <input matInput [(ngModel)]="searchText" (input)="searchEmployee()">

    </mat-form-field>

    <!-- @if(loading){

    <div class="spinner-container">
        <mat-spinner></mat-spinner>
    </div>

    } -->

    <!-- [hidden]="loading" -->

    <div class="table-container">
        <!-- <table mat-table [dataSource]="filteredemployees"> -->

        <!-- while pagination filteredemployees -> dataSource -->
        <table mat-table [dataSource]="dataSource" matSort>

            <!-- ID -->
            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
                <td mat-cell *matCellDef="let emp">
                    {{ emp._id }}
                </td>
            </ng-container>

            <!-- Name -->
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
                <td mat-cell *matCellDef="let emp">
                    {{ emp.name }}
                </td>
            </ng-container>

            <!-- Email -->
            <ng-container matColumnDef="email">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
                <td mat-cell *matCellDef="let emp">
                    {{ emp.email }}
                </td>
            </ng-container>

            <!-- Mobile -->
            <ng-container matColumnDef="mobile">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Mobile</th>
                <td mat-cell *matCellDef="let emp">
                    {{ emp.mobile }}
                </td>
            </ng-container>

            <!-- Department -->
            <ng-container matColumnDef="department">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Department</th>
                <td mat-cell *matCellDef="let emp">
                    {{ emp.department }}
                </td>
            </ng-container>

            <!-- Action -->
            <ng-container matColumnDef="action">

                <th mat-header-cell *matHeaderCellDef>
                    Action
                </th>

                <td mat-cell *matCellDef="let emp">

                    <!-- Admin -->
                    <div class="action-buttons" *ngIf="isAdmin">
                        <button mat-raised-button (click)="editEmployee(emp)">
                            Edit
                        </button> &nbsp;
                        <button mat-raised-button (click)="deleteEmployee(emp._id)">
                            Delete
                        </button>
                    </div>

                    <!-- Employee -->
                    <div class="action-buttons" *ngIf="!isAdmin">
                        <button *ngIf="emp.email === getEmail" mat-raised-button
                            (click)="editEmployee(emp)">

                            Edit

                        </button>

                        <!-- <p>  {{emp.email}}</p>
                        <p> {{getEmail}}</p> -->
                    </div>
                </td>

            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns">
            </tr>

            <tr mat-row *matRowDef="let row; columns: displayedColumns;">
            </tr>

        </table>

        <mat-paginator [pageSize]="5" [pageSizeOptions]="[5,10,20]" showFirstLastButtons>
        </mat-paginator>
    </div>

</mat-card>
