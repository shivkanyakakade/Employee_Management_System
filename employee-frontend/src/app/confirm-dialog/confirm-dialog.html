<h2 mat-dialog-title>
    Confirm Delete
</h2>

<mat-dialog-content>

    <p>{{ data.message }}</p>

</mat-dialog-content>

<mat-dialog-actions align="end">

    <button mat-button [mat-dialog-close]="false">

        Cancel

    </button>

    <button mat-raised-button [mat-dialog-close]="true">

        Delete

    </button>

</mat-dialog-actions>
